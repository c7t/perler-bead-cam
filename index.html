<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perler Cam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #1a1a2e;
    --panel:    #16213e;
    --border:   #0f3460;
    --accent:   #e94560;
    --accent2:  #f5a623;
    --text:     #e8e8f0;
    --muted:    #7a7a9a;
    --bead-gap: 1px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  header {
    width: 100%;
    padding: 10px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.04em;
  }

  .bead-icon {
    display: grid;
    grid-template-columns: repeat(3, 8px);
    gap: 2px;
  }
  .bead-icon span {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: block;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  select, input[type=range] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.75rem;
    padding: 3px 6px;
  }

  input[type=range] {
    width: 70px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .canvas-area {
    flex: 1;
    width: 100%;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(26, 26, 46, 0.9);
    z-index: 10;
  }

  #overlay p {
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
    max-width: 240px;
    line-height: 1.5;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { opacity: 0.7; }

  footer {
    width: 100%;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border-top: 2px solid var(--border);
    flex-shrink: 0;
  }

  .palette-row {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .swatch {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .swatch:hover { transform: scale(1.3); }
  .swatch.active { border-color: #fff; transform: scale(1.2); }

  .stat {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .stat span { color: var(--accent2); font-weight: 600; }

  #flipBtn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 0.7rem;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: border-color 0.15s, color 0.15s;
  }
  #flipBtn:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="bead-icon" id="beadIcon"></div>
    PERLER CAM
  </div>
  <div class="controls">
    <label for="sizeSlider">GRID</label>
    <input type="range" id="sizeSlider" min="20" max="100" value="50" step="5">
    <button id="flipBtn">↔ FLIP</button>
  </div>
</header>

<div class="canvas-area">
  <div id="overlay">
    <p>Point your camera at anything — see it as Perler beads in real time.</p>
    <button class="btn" id="startBtn">Enable Camera</button>
    <p id="errMsg" style="color: var(--accent); display:none"></p>
  </div>
  <canvas id="out"></canvas>
  <video id="vid" autoplay playsinline muted style="display:none"></video>
</div>

<footer>
  <div class="palette-row" id="paletteRow"></div>
  <div class="stat">BEADS <span id="beadCount">—</span></div>
</footer>

<script>
// ── Perler palettes ─────────────────────────────────────────────────────────
const PALETTES = {
  classic: [
    '#FFFFFF','#F5F5DC','#FFE4B5','#FFA500','#FF6347','#FF0000',
    '#DC143C','#FF69B4','#FF1493','#C71585','#800080','#9400D3',
    '#4B0082','#0000FF','#0000CD','#1E90FF','#00BFFF','#00CED1',
    '#008080','#008000','#228B22','#32CD32','#ADFF2F','#FFFF00',
    '#FFD700','#DAA520','#A0522D','#8B4513','#D2691E','#BC8F8F',
    '#808080','#A9A9A9','#C0C0C0','#000000',
  ],
  pastel: [
    '#FFFFFF','#FFD1DC','#FFDAB9','#FFF0BB','#B5EAD7','#C7CEEA',
    '#E2AFDE','#FF9AA2','#FFB7B2','#FFDAC1','#E2F0CB','#B5EAD7',
    '#C7CEEA','#F0E6FF','#D4F1F4','#FCE4EC','#F9FBE7','#E8F5E9',
    '#E3F2FD','#FFF8E1','#F3E5F5','#E0F7FA','#FFFDE7','#EDE7F6',
    '#F1F8E9','#E8EAF6','#FCE4EC','#FFF3E0','#E0F2F1','#F9FBE7',
    '#D0D0D0','#A8A8A8','#707070','#202020',
  ],
  neon: [
    '#FF073A','#FF6600','#FFFF00','#00FF41','#00FFFF','#007FFF',
    '#8B00FF','#FF00FF','#FF3EBF','#FE5F55','#F7C59F','#FFFFFC',
    '#CBF3F0','#2EC4B6','#E71D36','#FF9F1C','#FFBF69','#CBF3F0',
    '#011627','#0D0D0D','#1A1A2E','#FF073A','#39FF14','#0FF0FC',
    '#FF6EC7','#FF5F00','#BF00FF','#FF1744','#76FF03','#00E5FF',
    '#BDBDBD','#9E9E9E','#616161','#212121',
  ],
  earth: [
    '#FAEBD7','#F5DEB3','#DEB887','#D2B48C','#C4A35A','#B8860B',
    '#A0522D','#8B4513','#6B3A2A','#5C2D00','#3E1F00','#2D1200',
    '#556B2F','#6B8E23','#8FBC8F','#90EE90','#2E8B57','#006400',
    '#708090','#778899','#B0C4DE','#4682B4','#5F9EA0','#008B8B',
    '#F08080','#CD5C5C','#B22222','#8B0000','#BC8F8F','#F4A460',
    '#696969','#808080','#A9A9A9','#D3D3D3',
  ],
};

let paletteName = 'classic';
let palette = PALETTES[paletteName];

// ── DOM refs ─────────────────────────────────────────────────────────────────
const video   = document.getElementById('vid');
const canvas  = document.getElementById('out');
const ctx     = canvas.getContext('2d', { willReadFrequently: true });
const overlay = document.getElementById('overlay');
const startBtn= document.getElementById('startBtn');
const errMsg  = document.getElementById('errMsg');
const sizeSlider = document.getElementById('sizeSlider');
const beadCount  = document.getElementById('beadCount');
const paletteRow = document.getElementById('paletteRow');
const flipBtn    = document.getElementById('flipBtn');
const beadIcon   = document.getElementById('beadIcon');

// ── State ─────────────────────────────────────────────────────────────────────
let animId = null;
let flipped = true;
let gridCols = 50;

// ── Bead icon decoration ──────────────────────────────────────────────────────
const iconColors = ['#e94560','#f5a623','#00e5ff','#76ff03','#bf00ff','#ffd700','#ff69b4','#00ff41','#ff6347'];
for (let i = 0; i < 9; i++) {
  const s = document.createElement('span');
  s.style.background = iconColors[i];
  beadIcon.appendChild(s);
}

// ── Palette UI ────────────────────────────────────────────────────────────────
function buildPaletteUI() {
  paletteRow.innerHTML = '';
  Object.keys(PALETTES).forEach(name => {
    const swatch = document.createElement('div');
    swatch.className = 'swatch' + (name === paletteName ? ' active' : '');
    // sample color from palette
    const sample = PALETTES[name][Math.floor(PALETTES[name].length * 0.4)];
    swatch.style.background = sample;
    swatch.title = name;
    swatch.addEventListener('click', () => {
      paletteName = name;
      palette = PALETTES[name];
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
    });
    paletteRow.appendChild(swatch);
  });
}
buildPaletteUI();

// ── Color matching (Euclidean in RGB, fast enough for real-time) ──────────────
const parsedPalette = {};
function hexToRgb(hex) {
  if (parsedPalette[hex]) return parsedPalette[hex];
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  parsedPalette[hex] = [r,g,b];
  return [r,g,b];
}

function nearestColor(r, g, b) {
  let best = null, bestDist = Infinity;
  for (const hex of palette) {
    const [pr, pg, pb] = hexToRgb(hex);
    const d = (r-pr)**2 + (g-pg)**2 + (b-pb)**2;
    if (d < bestDist) { bestDist = d; best = hex; }
  }
  return best;
}

// Tiny scratch canvas for downsampling
const scratch = document.createElement('canvas');
const sctx = scratch.getContext('2d', { willReadFrequently: true });

// ── Render one frame ──────────────────────────────────────────────────────────
function renderFrame() {
  if (video.readyState < 2) { animId = requestAnimationFrame(renderFrame); return; }

  const vw = video.videoWidth  || 640;
  const vh = video.videoHeight || 480;
  const aspect = vw / vh;

  // Determine bead grid size from slider
  gridCols = parseInt(sizeSlider.value);
  const gridRows = Math.round(gridCols / aspect);

  // Fit canvas to container
  const area = canvas.parentElement;
  const displayW = area.clientWidth;
  const displayH = area.clientHeight;
  const beadPx = Math.floor(Math.min(displayW / gridCols, displayH / gridRows));
  const cw = beadPx * gridCols;
  const ch = beadPx * gridRows;
  canvas.width  = cw;
  canvas.height = ch;

  // Downsample video → grid
  scratch.width  = gridCols;
  scratch.height = gridRows;
  if (flipped) {
    sctx.save();
    sctx.translate(gridCols, 0);
    sctx.scale(-1, 1);
    sctx.drawImage(video, 0, 0, gridCols, gridRows);
    sctx.restore();
  } else {
    sctx.drawImage(video, 0, 0, gridCols, gridRows);
  }
  const imgData = sctx.getImageData(0, 0, gridCols, gridRows).data;

  ctx.clearRect(0, 0, cw, ch);

  const gap = beadPx > 6 ? 1 : 0;
  const r2  = Math.floor((beadPx - gap) / 2);

  for (let row = 0; row < gridRows; row++) {
    for (let col = 0; col < gridCols; col++) {
      const i = (row * gridCols + col) * 4;
      const red = imgData[i], grn = imgData[i+1], blu = imgData[i+2];

      const hex = nearestColor(red, grn, blu);
      const [pr, pg, pb] = hexToRgb(hex);

      const cx = col * beadPx + Math.floor(beadPx / 2);
      const cy = row * beadPx + Math.floor(beadPx / 2);

      // Base bead
      ctx.beginPath();
      ctx.arc(cx, cy, r2, 0, Math.PI * 2);
      ctx.fillStyle = hex;
      ctx.fill();

      if (beadPx >= 8) {
        // Highlight
        const grd = ctx.createRadialGradient(cx - r2*0.3, cy - r2*0.3, r2*0.05, cx, cy, r2);
        grd.addColorStop(0, `rgba(255,255,255,0.55)`);
        grd.addColorStop(0.45, `rgba(255,255,255,0.08)`);
        grd.addColorStop(1,   `rgba(0,0,0,0.25)`);
        ctx.beginPath();
        ctx.arc(cx, cy, r2, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Center hole
        ctx.beginPath();
        ctx.arc(cx, cy, r2 * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,0,0,0.35)`;
        ctx.fill();
      }
    }
  }

  beadCount.textContent = (gridCols * gridRows).toLocaleString();
  animId = requestAnimationFrame(renderFrame);
}

// ── Camera start ──────────────────────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream;
    video.play();
    overlay.style.display = 'none';
    if (animId) cancelAnimationFrame(animId);
    renderFrame();
  } catch (e) {
    errMsg.style.display = '';
    errMsg.textContent = `Camera error: ${e.message}`;
  }
});

flipBtn.addEventListener('click', () => { flipped = !flipped; });
</script>
</body>
</html>
